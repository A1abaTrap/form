<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A5 VIP Birthday Card Sheet</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root{
            --ink:#1b1b1b;
            --soft:#7a5c5c;
            --accent:#c85d7a;
            --accent2:#f2c14e;
            --border:#2a2a2a;
        }

        *{ box-sizing:border-box; }

        html, body{
            margin:0;
            width:100%;
            min-height:100%;
            background:#fff;
            font-family:"Montserrat", Arial, sans-serif;
            color:var(--ink);
        }

        body{ padding:20px; }

        .page{
            position:relative;
            width:min(100%, 148mm);
            aspect-ratio:148 / 210;
            margin:0 auto 20px;
            overflow:hidden;
        }

        .cut-guide{
            position:absolute;
            inset:0;
            margin:auto;
            width:min(130mm, calc(100% - 10mm));
            height:calc((min(135mm, calc(100% - 10mm))) / 1.6);
            border:1px dashed rgba(0,0,0,.25);
            pointer-events:none;
        }

        .cut-label{
            position:absolute;
            top:4mm;
            left:50%;
            transform:translateX(-50%);
            font-size:9px;
            letter-spacing:2px;
            font-weight:700;
            color:rgba(0,0,0,.45);
            text-transform:uppercase;
        }

        /* ✅ CARD FIX */
        .card{
            position:absolute;
            left:50%;
            top:50%;
            width:min(126mm, calc(100% - 24mm));
            aspect-ratio:1.6 / 1;
            transform:translate(-50%,-50%);
            background:linear-gradient(135deg, #fff, #fff4ea);
            border:2px solid var(--border);
            border-radius:2mm;
            overflow:hidden;
            box-shadow:0 10px 30px rgba(0,0,0,0.08);
        }

        .card::before{
            content:"";
            position:absolute;
            inset:4mm;
            border:1px solid rgba(0,0,0,.85);
        }

        .card::after{
            content:"";
            position:absolute;
            inset:7mm;
            border:1px dashed rgba(200,93,122,.5);
        }

        .ornament span{
            position:absolute;
            width:10mm;
            height:10mm;
            border-top:1px solid var(--accent);
            border-left:1px solid var(--accent);
        }

        .tl{ top:5mm; left:5mm; }
        .tr{ top:5mm; right:5mm; transform:scaleX(-1); }
        .bl{ bottom:5mm; left:5mm; transform:scaleY(-1); }
        .br{ bottom:5mm; right:5mm; transform:scale(-1); }

        .content{
            position:relative;
            z-index:1;
            height:100%;
            padding:12mm 12mm 10mm;
            display:flex;
            flex-direction:column;
            justify-content:space-between;
            text-align:center;
        }

        .topline{
            font-size:9px;
            font-weight:700;
            letter-spacing:2.6px;
            text-transform:uppercase;
            color:var(--accent);
        }

        .title-wrap{
            position:relative;
            margin-top:2mm;
        }

        /* ✅ FIX watermark */
        .watermark{
            position:absolute;
            left:50%;
            top:50%;
            transform:translate(-50%,-50%);
            font-size:74px;
            font-weight:800;
            color:var(--accent2);
            opacity:.15;
            user-select:none;
            pointer-events:none;
        }

        h1{
            margin:0;
            font-size:23px;
            font-weight:800;
            letter-spacing:3px;
            text-transform:uppercase;
        }

        .message{
            margin:7mm auto 0;
            max-width:92%;
            font-size:11px;
            line-height:1.8;
        }

        .text{
            font-size:12px;
            font-weight:700;
            letter-spacing:2px;
            color:var(--accent);
        }

        .bottom-row{
            display:flex;
            align-items:center;
            gap:4mm;
        }

        .qr{
            width:26mm;
            height:26mm;
            border-radius:2mm;
            border:1px solid rgba(0,0,0,.15);
        }

        .arrow{
            margin-left:auto;
            font-size:16px;
            color:var(--accent);
        }

        .back-content{
            position:relative;
            height:100%;
            display:flex;
            align-items:center;
            justify-content:center;
            text-align:center;
        }

        .back-watermark{
            position:absolute;
            left:50%;
            top:50%;
            transform:translate(-50%,-50%);
            font-size:74px;
            font-weight:800;
            color:var(--accent2);
            opacity:.15;
            pointer-events:none;
        }

        @media print{
            @page{ size:A5 portrait; margin:0; }

            body{ padding:0; }

            .page{
                width:148mm;
                height:210mm;
                page-break-after:always;
            }
        }
    </style>
</head>

<body>
<div id="app">

    <!-- FRONT -->
    <main class="page">
        <div class="cut-guide"></div>
        <div class="cut-label">CUT HERE</div>

        <article class="card">
            <div class="ornament">
                <span class="tl"></span>
                <span class="tr"></span>
                <span class="bl"></span>
                <span class="br"></span>
            </div>

            <div class="content">

                <div>
                    <div class="topline">★ HAPPY BIRTHDAY QUYÊN ★</div>

                    <div class="title-wrap">
                        <div class="watermark">HOÀNG QUYÊN</div>
                        <h1>CHÚC MỪNG SINH NHẬT</h1>
                    </div>

                    <p class="message">
                        Chúc bạn tuổi mới mạnh mẽ, vui vẻ, mạnh khỏe, cười nhiều lên nhé 🎂💐
                    </p>

                    <div class="text">30/06/2026</div>
                </div>

                <div class="bottom-row">
                    <img class="qr" src="https://a1abatrap.github.io/form/qr_happyQ.png">
                    <div class="arrow">→</div>
                </div>

            </div>
        </article>
    </main>

    <!-- BACK -->
    <main class="page">
        <div class="cut-guide"></div>
        <div class="cut-label">CUT HERE</div>

        <article class="card">

            <div class="back-content">
                <div class="back-watermark">HOÀNG QUYÊN</div>
                <div>
                    <div class="text">Enjoy your meal!</div>
                    <div class="text">7-9-21-19-5 (A=1)</div>
                </div>
            </div>

        </article>
    </main>

</div>

<script>
(function () {
    const expiry = new Date('2026-06-29T23:59:59');
    if (new Date() > expiry) {
        document.getElementById('app').style.display = 'none';
    }
})();
</script>

</body>
</html>
